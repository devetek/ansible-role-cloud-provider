---
# provider auth information
cloud_provider: "gcp" # gcp | idcloudhost | biznetgio | digitalocean
cloud_provider_auth: {}

# resource type creation
cloud_provider_resource_type:
  - "vm"
cloud_provider_resource_detail: {}

# IDCloudHost VM create requests can be asynchronous: the API can accept the
# request before the VM is immediately visible in /user-resource/vm/list.
idcloudhost_vm_default_create_timeout: 120
idcloudhost_vm_default_wait_timeout: 1800
idcloudhost_vm_default_wait_delay: 10

# IDCloudHost can occasionally return a rejected create response even though the
# VM is being provisioned. Reconcile retryable rejections against the VM list
# before failing the task.
idcloudhost_vm_default_reconcile_timeout: 1800
idcloudhost_vm_default_reconcile_delay: 10

# Biznet Gio NEO Lite create requests can take time before the account and VM
# details are visible through the portal API.
biznetgio_vm_default_create_timeout: 120
biznetgio_vm_default_wait_timeout: 1800
biznetgio_vm_default_wait_delay: 10

# DigitalOcean droplet create/update/delete timeout in seconds.
digitalocean_vm_default_timeout: 600
