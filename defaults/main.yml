---
# provider auth information
cloud_provider: "gcp" # gcp | idcloudhost
cloud_provider_auth: {}

# resource type creation
cloud_provider_resource_type:
  - "vm"
cloud_provider_resource_detail: {}

# IDCloudHost VM create requests can be asynchronous: the API can accept the
# request before the VM is immediately visible in /user-resource/vm/list.
idcloudhost_vm_default_wait_timeout: 1800
idcloudhost_vm_default_wait_delay: 10
