---
- name: Syntax check DigitalOcean Droplet native role path
  hosts: localhost
  gather_facts: false
  vars:
    state: present
    with_output: true
    cloud_provider: digitalocean
    cloud_provider_auth:
      token: test-token
    cloud_provider_resource_type:
      - droplet
    cloud_provider_resource_detail:
      droplet:
        name: dpanel-do-native-test
        region: sgp1
        size: s-1vcpu-1gb
        image: ubuntu-24-04-x64
        public_key: ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQDpanelSyntaxTest dpanel@example
        tags:
          - managed-by-dpanel
  roles:
    - role: ansible-role-cloud-provider
