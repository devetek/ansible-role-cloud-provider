---
- name: Validate Biznet Gio NEO Lite VM create input
  ansible.builtin.assert:
    that:
      - cloud_provider_auth.token | default(cloud_provider_auth.x_token | default(cloud_provider_auth.api_token | default(''))) | length > 0
      - cloud_provider_resource_detail.vm is defined
      - cloud_provider_resource_detail.vm.product_id is defined
      - cloud_provider_resource_detail.vm.cycle is defined
      - cloud_provider_resource_detail.vm.select_os is defined
      - cloud_provider_resource_detail.vm.keypair_id is defined or cloud_provider_resource_detail.vm.public_key | default('') | length > 0 or cloud_provider_resource_detail.vm.public_keys | default([]) | length > 0
      - cloud_provider_resource_detail.vm.ssh_and_console_user is defined
      - cloud_provider_resource_detail.vm.console_password is defined
      - cloud_provider_resource_detail.vm.vm_name is defined or cloud_provider_resource_detail.vm.name is defined
    fail_msg: "Biznet Gio NEO Lite VM creation requires auth.token, vm product_id, cycle, select_os, vm_name, ssh_and_console_user, console_password, and either vm.keypair_id or a dPanel SSH public key."

- name: Set Biznet Gio NEO Lite VM variables
  ansible.builtin.set_fact:
    biznetgio_api_base_url_raw: "{{ cloud_provider_auth.api_url | default(cloud_provider_auth.api_base_url | default(cloud_provider_auth.base_url | default('https://api.portal.biznetgio.com'))) | regex_replace('/+$', '') }}"
    biznetgio_api_token: "{{ cloud_provider_auth.token | default(cloud_provider_auth.x_token | default(cloud_provider_auth.api_token)) }}"
    biznetgio_vm: "{{ cloud_provider_resource_detail.vm }}"
    biznetgio_vm_name: "{{ cloud_provider_resource_detail.vm.vm_name | default(cloud_provider_resource_detail.vm.name) }}"
    biznetgio_vm_public_key: "{{ cloud_provider_resource_detail.vm.public_key | default((cloud_provider_resource_detail.vm.public_keys | default([''])) | first) }}"
    biznetgio_vm_keypair_name: "{{ cloud_provider_resource_detail.vm.keypair_name | default('dpanel-' ~ (cloud_provider_resource_detail.vm.vm_name | default(cloud_provider_resource_detail.vm.name))) }}"
    biznetgio_vm_wait_timeout: "{{ [cloud_provider_resource_detail.vm.wait_timeout | default(cloud_provider_auth.vm_wait_timeout | default(biznetgio_vm_default_wait_timeout | default(1800))) | int, 1] | max }}"
    biznetgio_vm_wait_delay: "{{ [cloud_provider_resource_detail.vm.wait_delay | default(cloud_provider_auth.vm_wait_delay | default(biznetgio_vm_default_wait_delay | default(10))) | int, 1] | max }}"
    biznetgio_vm_create_timeout: "{{ [cloud_provider_resource_detail.vm.create_timeout | default(cloud_provider_auth.vm_create_timeout | default(biznetgio_vm_default_create_timeout | default(120))) | int, 1] | max }}"
    biznetgio_vm_create_success_statuses:
      - 200
      - 201
      - 202
  no_log: true

- name: Normalize Biznet Gio API base URL
  ansible.builtin.set_fact:
    biznetgio_api_base_url: "{{ biznetgio_api_base_url_raw if biznetgio_api_base_url_raw is search('/v1$') else biznetgio_api_base_url_raw ~ '/v1' }}"
    biznetgio_vm_wait_retries: "{{ [((biznetgio_vm_wait_timeout | int) / (biznetgio_vm_wait_delay | int)) | round(0, 'ceil') | int, 1] | max }}"

- name: List Biznet Gio NEO Lite accounts
  ansible.builtin.uri:
    url: "{{ biznetgio_api_base_url }}/neolites/accounts"
    method: GET
    headers:
      x-token: "{{ biznetgio_api_token }}"
    return_content: true
    status_code:
      - 200
      - 401
      - 403
      - 422
      - 500
  register: biznetgio_vm_accounts_response
  changed_when: false
  failed_when: false
  no_log: true

- name: Fail when Biznet Gio NEO Lite accounts cannot be listed
  ansible.builtin.fail:
    msg: >-
      Biznet Gio NEO Lite account list failed
      (status={{ biznetgio_vm_accounts_response.status | default('unknown') }},
      path=/neolites/accounts).
      Provider response: {{
        biznetgio_vm_accounts_response.json.detail
        | default(biznetgio_vm_accounts_response.json.message
        | default(biznetgio_vm_accounts_response.json.error
        | default(biznetgio_vm_accounts_response.content
        | default(biznetgio_vm_accounts_response.msg | default('empty provider response')))))
      }}.
  when: biznetgio_vm_accounts_response.status | default(0) | int != 200

- name: Normalize Biznet Gio NEO Lite account list
  ansible.builtin.set_fact:
    biznetgio_vm_accounts_list: >-
      {{
        (
          biznetgio_vm_accounts_response.json.data
          | default(biznetgio_vm_accounts_response.json.items
          | default(biznetgio_vm_accounts_response.json.results
          | default(biznetgio_vm_accounts_response.json.accounts
          | default(biznetgio_vm_accounts_response.json.neolites
          | default([])))))
        )
        if (biznetgio_vm_accounts_response.json | default({})) is mapping
        else (biznetgio_vm_accounts_response.json | default([]))
      }}

- name: Resolve existing Biznet Gio NEO Lite VM by vm_name
  ansible.builtin.set_fact:
    biznetgio_vm_existing: >-
      {{
        (
          biznetgio_vm_accounts_list
          | selectattr('vm_name', 'equalto', biznetgio_vm_name)
          | list
          | first
          | default({})
        )
      }}

- name: Resolve existing Biznet Gio NEO Lite VM by name
  ansible.builtin.set_fact:
    biznetgio_vm_existing: >-
      {{
        (
          biznetgio_vm_accounts_list
          | selectattr('name', 'equalto', biznetgio_vm_name)
          | list
          | first
          | default({})
        )
      }}
  when: biznetgio_vm_existing | length == 0

- name: Resolve existing Biznet Gio NEO Lite VM by hostname
  ansible.builtin.set_fact:
    biznetgio_vm_existing: >-
      {{
        (
          biznetgio_vm_accounts_list
          | selectattr('hostname', 'equalto', biznetgio_vm_name)
          | list
          | first
          | default({})
        )
      }}
  when: biznetgio_vm_existing | length == 0

- name: Resolve existing Biznet Gio NEO Lite VM by nested extra_details name
  ansible.builtin.set_fact:
    biznetgio_vm_existing: >-
      {{
        (
          biznetgio_vm_accounts_list
          | selectattr('extra_details.name', 'equalto', biznetgio_vm_name)
          | list
          | first
          | default({})
        )
      }}
  when: biznetgio_vm_existing | length == 0

- name: Set Biznet Gio NEO Lite keypair ID from request
  ansible.builtin.set_fact:
    biznetgio_vm_keypair_id: "{{ biznetgio_vm.keypair_id | default('') }}"
  no_log: true

- name: List Biznet Gio NEO Lite keypairs for dPanel public key
  ansible.builtin.uri:
    url: "{{ biznetgio_api_base_url }}/neolites/keypairs/"
    method: GET
    headers:
      x-token: "{{ biznetgio_api_token }}"
    return_content: true
    status_code:
      - 200
  register: biznetgio_vm_keypairs_response
  changed_when: false
  failed_when: false
  when:
    - biznetgio_vm_existing | length == 0
    - biznetgio_vm_keypair_id | string | length == 0
  no_log: true

- name: Normalize Biznet Gio NEO Lite keypair list
  ansible.builtin.set_fact:
    biznetgio_vm_keypairs_list: >-
      {{
        (
          biznetgio_vm_keypairs_response.json.data
          | default(biznetgio_vm_keypairs_response.json.items
          | default(biznetgio_vm_keypairs_response.json.results
          | default(biznetgio_vm_keypairs_response.json.keypairs
          | default(biznetgio_vm_keypairs_response.json.key_pairs
          | default([])))))
        )
        if (biznetgio_vm_keypairs_response.json | default({})) is mapping
        else (biznetgio_vm_keypairs_response.json | default([]))
      }}
  when:
    - biznetgio_vm_existing | length == 0
    - biznetgio_vm_keypair_id | string | length == 0

- name: Initialize Biznet Gio NEO Lite dPanel keypair lookup
  ansible.builtin.set_fact:
    biznetgio_vm_keypair_existing: {}
  when:
    - biznetgio_vm_existing | length == 0
    - biznetgio_vm_keypair_id | string | length == 0

- name: Resolve Biznet Gio NEO Lite keypair by dPanel public key
  ansible.builtin.set_fact:
    biznetgio_vm_keypair_existing: "{{ biznetgio_vm_keypair_item }}"
  loop: "{{ biznetgio_vm_keypairs_list | default([]) }}"
  loop_control:
    loop_var: biznetgio_vm_keypair_item
  when:
    - biznetgio_vm_existing | length == 0
    - biznetgio_vm_keypair_id | string | length == 0
    - biznetgio_vm_keypair_existing | default({}) | length == 0
    - biznetgio_vm_keypair_item.public_key | default('') | trim == biznetgio_vm_public_key | trim
  no_log: true

- name: Set Biznet Gio NEO Lite keypair ID from existing dPanel public key
  ansible.builtin.set_fact:
    biznetgio_vm_keypair_id: "{{ biznetgio_vm_keypair_existing.keypair_id | default(biznetgio_vm_keypair_existing.id | default('')) }}"
  when:
    - biznetgio_vm_existing | length == 0
    - biznetgio_vm_keypair_id | string | length == 0
    - biznetgio_vm_keypair_existing | default({}) | length > 0
  no_log: true

- name: Import dPanel public key into Biznet Gio NEO Lite keypairs
  ansible.builtin.uri:
    url: "{{ biznetgio_api_base_url }}/neolites/keypairs/import"
    method: POST
    headers:
      x-token: "{{ biznetgio_api_token }}"
      content-type: application/json
    body_format: json
    body:
      name: "{{ biznetgio_vm_keypair_name }}"
      public_key: "{{ biznetgio_vm_public_key }}"
    return_content: true
    status_code:
      - 200
      - 201
      - 202
      - 400
      - 401
      - 403
      - 409
      - 422
      - 500
  register: biznetgio_vm_keypair_import_response
  changed_when: biznetgio_vm_keypair_import_response.status in [200, 201, 202]
  failed_when: false
  when:
    - biznetgio_vm_existing | length == 0
    - biznetgio_vm_keypair_id | string | length == 0
  no_log: true

- name: Fail when Biznet Gio NEO Lite dPanel public key import fails
  ansible.builtin.fail:
    msg: >-
      Biznet Gio NEO Lite keypair import failed
      (status={{ biznetgio_vm_keypair_import_response.status | default('unknown') }},
      path=/neolites/keypairs/import,
      name={{ biznetgio_vm_keypair_name }}).
      Provider response: {{
        biznetgio_vm_keypair_import_response.json.detail
        | default(biznetgio_vm_keypair_import_response.json.message
        | default(biznetgio_vm_keypair_import_response.json.error
        | default(biznetgio_vm_keypair_import_response.json.errors
        | default(biznetgio_vm_keypair_import_response.content
        | default(biznetgio_vm_keypair_import_response.msg | default('empty provider response'))))))
      }}.
  when:
    - biznetgio_vm_existing | length == 0
    - biznetgio_vm_keypair_import_response is defined
    - biznetgio_vm_keypair_import_response.status not in [200, 201, 202]

- name: Normalize Biznet Gio NEO Lite imported keypair response
  ansible.builtin.set_fact:
    biznetgio_vm_keypair_import_payload: >-
      {{
        (
          biznetgio_vm_keypair_import_response.json.data
          | default(biznetgio_vm_keypair_import_response.json.result
          | default(biznetgio_vm_keypair_import_response.json.keypair
          | default(biznetgio_vm_keypair_import_response.json)))
        )
        if ((biznetgio_vm_keypair_import_response.json | default({})) is mapping and (biznetgio_vm_keypair_import_response.status | default(0) | int in [200, 201, 202]))
        else ({})
      }}
  when:
    - biznetgio_vm_existing | length == 0
    - biznetgio_vm_keypair_import_response is defined
    - biznetgio_vm_keypair_import_response.status in [200, 201, 202]
  no_log: true

- name: Set Biznet Gio NEO Lite keypair ID from import response
  ansible.builtin.set_fact:
    biznetgio_vm_keypair_id: "{{ biznetgio_vm_keypair_import_payload.keypair_id | default(biznetgio_vm_keypair_import_payload.id | default('')) }}"
  when:
    - biznetgio_vm_existing | length == 0
    - biznetgio_vm_keypair_id | string | length == 0
    - biznetgio_vm_keypair_import_payload | default({}) | length > 0
  no_log: true

- name: Refresh Biznet Gio NEO Lite keypairs after dPanel public key import
  ansible.builtin.uri:
    url: "{{ biznetgio_api_base_url }}/neolites/keypairs/"
    method: GET
    headers:
      x-token: "{{ biznetgio_api_token }}"
    return_content: true
    status_code:
      - 200
  register: biznetgio_vm_keypairs_refresh_response
  changed_when: false
  failed_when: false
  when:
    - biznetgio_vm_existing | length == 0
    - biznetgio_vm_keypair_id | string | length == 0
  no_log: true

- name: Normalize refreshed Biznet Gio NEO Lite keypair list
  ansible.builtin.set_fact:
    biznetgio_vm_keypairs_refresh_list: >-
      {{
        (
          biznetgio_vm_keypairs_refresh_response.json.data
          | default(biznetgio_vm_keypairs_refresh_response.json.items
          | default(biznetgio_vm_keypairs_refresh_response.json.results
          | default(biznetgio_vm_keypairs_refresh_response.json.keypairs
          | default(biznetgio_vm_keypairs_refresh_response.json.key_pairs
          | default([])))))
        )
        if (biznetgio_vm_keypairs_refresh_response.json | default({})) is mapping
        else (biznetgio_vm_keypairs_refresh_response.json | default([]))
      }}
  when:
    - biznetgio_vm_existing | length == 0
    - biznetgio_vm_keypair_id | string | length == 0

- name: Initialize refreshed Biznet Gio NEO Lite dPanel keypair lookup
  ansible.builtin.set_fact:
    biznetgio_vm_keypair_refreshed: {}
  when:
    - biznetgio_vm_existing | length == 0
    - biznetgio_vm_keypair_id | string | length == 0

- name: Resolve refreshed Biznet Gio NEO Lite keypair by dPanel public key
  ansible.builtin.set_fact:
    biznetgio_vm_keypair_refreshed: "{{ biznetgio_vm_keypair_refresh_item }}"
  loop: "{{ biznetgio_vm_keypairs_refresh_list | default([]) }}"
  loop_control:
    loop_var: biznetgio_vm_keypair_refresh_item
  when:
    - biznetgio_vm_existing | length == 0
    - biznetgio_vm_keypair_id | string | length == 0
    - biznetgio_vm_keypair_refreshed | default({}) | length == 0
    - biznetgio_vm_keypair_refresh_item.public_key | default('') | trim == biznetgio_vm_public_key | trim
  no_log: true

- name: Set Biznet Gio NEO Lite keypair ID from refreshed dPanel public key
  ansible.builtin.set_fact:
    biznetgio_vm_keypair_id: "{{ biznetgio_vm_keypair_refreshed.keypair_id | default(biznetgio_vm_keypair_refreshed.id | default('')) }}"
  when:
    - biznetgio_vm_existing | length == 0
    - biznetgio_vm_keypair_id | string | length == 0
    - biznetgio_vm_keypair_refreshed | default({}) | length > 0
  no_log: true

- name: Fail when Biznet Gio NEO Lite keypair ID cannot be resolved
  ansible.builtin.fail:
    msg: "Biznet Gio NEO Lite VM {{ biznetgio_vm_name }} could not resolve a keypair_id from the selected dPanel SSH key."
  when:
    - biznetgio_vm_existing | length == 0
    - biznetgio_vm_keypair_id | string | length == 0

- name: Initialize Biznet Gio NEO Lite create body
  ansible.builtin.set_fact:
    biznetgio_vm_create_body:
      product_id: "{{ biznetgio_vm.product_id | int }}"
      cycle: "{{ biznetgio_vm.cycle }}"
      select_os: "{{ biznetgio_vm.select_os }}"
      keypair_id: "{{ biznetgio_vm_keypair_id | int }}"
      vm_name: "{{ biznetgio_vm_name }}"
      ssh_and_console_user: "{{ biznetgio_vm.ssh_and_console_user }}"
      console_password: "{{ biznetgio_vm.console_password }}"
  when: biznetgio_vm_existing | length == 0
  no_log: true

- name: Add optional Biznet Gio NEO Lite create fields
  ansible.builtin.set_fact:
    biznetgio_vm_create_body: "{{ biznetgio_vm_create_body | combine({ biznetgio_vm_optional_field: biznetgio_vm[biznetgio_vm_optional_field] }) }}"
  loop:
    - description
    - promocode
    - pay_invoice_with_cc
  loop_control:
    loop_var: biznetgio_vm_optional_field
  when:
    - biznetgio_vm_existing | length == 0
    - biznetgio_vm[biznetgio_vm_optional_field] is defined
  no_log: true

- name: Create Biznet Gio NEO Lite VM
  ansible.builtin.uri:
    url: "{{ biznetgio_api_base_url }}/neolites"
    method: POST
    headers:
      x-token: "{{ biznetgio_api_token }}"
      content-type: application/json
    body_format: json
    body: "{{ biznetgio_vm_create_body }}"
    return_content: true
    timeout: "{{ biznetgio_vm_create_timeout }}"
    status_code:
      - 200
      - 201
      - 202
      - 400
      - 401
      - 403
      - 404
      - 409
      - 422
      - 500
  register: biznetgio_vm_create_response
  changed_when: biznetgio_vm_create_response.status in biznetgio_vm_create_success_statuses
  failed_when: false
  when: biznetgio_vm_existing | length == 0
  no_log: true

- name: Build Biznet Gio NEO Lite create rejection detail
  ansible.builtin.set_fact:
    biznetgio_vm_create_error_status: "{{ biznetgio_vm_create_response.status | default('unknown') }}"
    biznetgio_vm_create_error_response: >-
      {%- set response_json = biznetgio_vm_create_response.json | default({}) -%}
      {%- if response_json is mapping -%}
      {{ response_json.detail | default(response_json.message | default(response_json.error | default(response_json.errors | default(response_json | to_json)))) }}
      {%- elif response_json -%}
      {{ response_json | to_json }}
      {%- elif biznetgio_vm_create_response.content | default('') | length > 0 -%}
      {{ biznetgio_vm_create_response.content }}
      {%- elif biznetgio_vm_create_response.msg | default('') | length > 0 -%}
      {{ biznetgio_vm_create_response.msg }}
      {%- else -%}
      empty provider response
      {%- endif -%}
  when:
    - biznetgio_vm_existing | length == 0
    - biznetgio_vm_create_response is defined
    - biznetgio_vm_create_response.status not in biznetgio_vm_create_success_statuses

- name: Fail when Biznet Gio NEO Lite VM creation request is rejected
  ansible.builtin.fail:
    msg: >-
      Biznet Gio NEO Lite VM creation request was rejected
      (status={{ biznetgio_vm_create_error_status | default(biznetgio_vm_create_response.status | default('unknown')) }},
      path=/neolites,
      vm_name={{ biznetgio_vm_name }}).
      Provider response: {{ biznetgio_vm_create_error_response | default('empty provider response') }}.
      Create request timeout: {{ biznetgio_vm_create_timeout }} seconds.
  when:
    - biznetgio_vm_existing | length == 0
    - biznetgio_vm_create_response.status not in biznetgio_vm_create_success_statuses

- name: Normalize Biznet Gio NEO Lite create response
  ansible.builtin.set_fact:
    biznetgio_vm_create_payload: >-
      {{
        (
          biznetgio_vm_create_response.json.data
          | default(biznetgio_vm_create_response.json.result
          | default(biznetgio_vm_create_response.json.account
          | default(biznetgio_vm_create_response.json)))
        )
        if (biznetgio_vm_existing | length == 0 and (biznetgio_vm_create_response.json | default({})) is mapping)
        else ({})
      }}

- name: Set Biznet Gio NEO Lite account ID from provider response
  ansible.builtin.set_fact:
    biznetgio_vm_account_id: >-
      {{
        biznetgio_vm_existing.account_id
        | default(biznetgio_vm_existing.id
        | default(biznetgio_vm_existing.service_id
        | default(biznetgio_vm_existing.account.id
        | default(biznetgio_vm_existing.extra_details.account_id
        | default(biznetgio_vm_create_payload.account_id
        | default(biznetgio_vm_create_payload.id
        | default(biznetgio_vm_create_payload.service_id
        | default(biznetgio_vm_create_payload.account.id | default('')))))))))
      }}

- name: Wait for Biznet Gio NEO Lite account to appear
  ansible.builtin.uri:
    url: "{{ biznetgio_api_base_url }}/neolites/accounts"
    method: GET
    headers:
      x-token: "{{ biznetgio_api_token }}"
    return_content: true
    status_code:
      - 200
  register: biznetgio_vm_wait_accounts_response
  until: >-
    (
      (
        (
          biznetgio_vm_wait_accounts_response.json.data
          | default(biznetgio_vm_wait_accounts_response.json.items
          | default(biznetgio_vm_wait_accounts_response.json.results
          | default(biznetgio_vm_wait_accounts_response.json.accounts
          | default(biznetgio_vm_wait_accounts_response.json.neolites
          | default([])))))
        )
        if (biznetgio_vm_wait_accounts_response.json | default({})) is mapping
        else (biznetgio_vm_wait_accounts_response.json | default([]))
      )
      | selectattr('vm_name', 'equalto', biznetgio_vm_name)
      | list
      | length
    ) > 0
    or
    (
      (
        (
          biznetgio_vm_wait_accounts_response.json.data
          | default(biznetgio_vm_wait_accounts_response.json.items
          | default(biznetgio_vm_wait_accounts_response.json.results
          | default(biznetgio_vm_wait_accounts_response.json.accounts
          | default(biznetgio_vm_wait_accounts_response.json.neolites
          | default([])))))
        )
        if (biznetgio_vm_wait_accounts_response.json | default({})) is mapping
        else (biznetgio_vm_wait_accounts_response.json | default([]))
      )
      | selectattr('extra_details.name', 'equalto', biznetgio_vm_name)
      | list
      | length
    ) > 0
    or
    (
      (
        (
          biznetgio_vm_wait_accounts_response.json.data
          | default(biznetgio_vm_wait_accounts_response.json.items
          | default(biznetgio_vm_wait_accounts_response.json.results
          | default(biznetgio_vm_wait_accounts_response.json.accounts
          | default(biznetgio_vm_wait_accounts_response.json.neolites
          | default([])))))
        )
        if (biznetgio_vm_wait_accounts_response.json | default({})) is mapping
        else (biznetgio_vm_wait_accounts_response.json | default([]))
      )
      | selectattr('name', 'equalto', biznetgio_vm_name)
      | list
      | length
    ) > 0
    or
    (
      (
        (
          biznetgio_vm_wait_accounts_response.json.data
          | default(biznetgio_vm_wait_accounts_response.json.items
          | default(biznetgio_vm_wait_accounts_response.json.results
          | default(biznetgio_vm_wait_accounts_response.json.accounts
          | default(biznetgio_vm_wait_accounts_response.json.neolites
          | default([])))))
        )
        if (biznetgio_vm_wait_accounts_response.json | default({})) is mapping
        else (biznetgio_vm_wait_accounts_response.json | default([]))
      )
      | selectattr('hostname', 'equalto', biznetgio_vm_name)
      | list
      | length
    ) > 0
  retries: "{{ biznetgio_vm_wait_retries }}"
  delay: "{{ biznetgio_vm_wait_delay }}"
  failed_when: false
  when:
    - biznetgio_vm_existing | length == 0
    - biznetgio_vm_account_id | string | length == 0
  no_log: true

- name: Normalize Biznet Gio NEO Lite waited account list
  ansible.builtin.set_fact:
    biznetgio_vm_wait_accounts_list: >-
      {{
        (
          biznetgio_vm_wait_accounts_response.json.data
          | default(biznetgio_vm_wait_accounts_response.json.items
          | default(biznetgio_vm_wait_accounts_response.json.results
          | default(biznetgio_vm_wait_accounts_response.json.accounts
          | default(biznetgio_vm_wait_accounts_response.json.neolites
          | default([])))))
        )
        if (biznetgio_vm_wait_accounts_response.json | default({})) is mapping
        else (biznetgio_vm_wait_accounts_response.json | default([]))
      }}
  when:
    - biznetgio_vm_wait_accounts_response is defined
    - biznetgio_vm_account_id | string | length == 0

- name: Resolve created Biznet Gio NEO Lite account by vm_name
  ansible.builtin.set_fact:
    biznetgio_vm_created_account: >-
      {{
        (
          biznetgio_vm_wait_accounts_list
          | default([])
          | selectattr('vm_name', 'equalto', biznetgio_vm_name)
          | list
          | first
          | default({})
        )
      }}
  when: biznetgio_vm_account_id | string | length == 0

- name: Resolve created Biznet Gio NEO Lite account by name
  ansible.builtin.set_fact:
    biznetgio_vm_created_account: >-
      {{
        (
          biznetgio_vm_wait_accounts_list
          | default([])
          | selectattr('name', 'equalto', biznetgio_vm_name)
          | list
          | first
          | default({})
        )
      }}
  when:
    - biznetgio_vm_account_id | string | length == 0
    - biznetgio_vm_created_account | default({}) | length == 0

- name: Resolve created Biznet Gio NEO Lite account by hostname
  ansible.builtin.set_fact:
    biznetgio_vm_created_account: >-
      {{
        (
          biznetgio_vm_wait_accounts_list
          | default([])
          | selectattr('hostname', 'equalto', biznetgio_vm_name)
          | list
          | first
          | default({})
        )
      }}
  when:
    - biznetgio_vm_account_id | string | length == 0
    - biznetgio_vm_created_account | default({}) | length == 0

- name: Resolve created Biznet Gio NEO Lite account by nested extra_details name
  ansible.builtin.set_fact:
    biznetgio_vm_created_account: >-
      {{
        (
          biznetgio_vm_wait_accounts_list
          | default([])
          | selectattr('extra_details.name', 'equalto', biznetgio_vm_name)
          | list
          | first
          | default({})
        )
      }}
  when:
    - biznetgio_vm_account_id | string | length == 0
    - biznetgio_vm_created_account | default({}) | length == 0

- name: Set Biznet Gio NEO Lite account ID from account lookup
  ansible.builtin.set_fact:
    biznetgio_vm_account_id: >-
      {{
        biznetgio_vm_created_account.account_id
        | default(biznetgio_vm_created_account.id
        | default(biznetgio_vm_created_account.service_id
        | default(biznetgio_vm_created_account.account.id | default(''))))
      }}
  when:
    - biznetgio_vm_account_id | string | length == 0
    - biznetgio_vm_created_account | default({}) | length > 0

- name: Fail when Biznet Gio NEO Lite account ID cannot be resolved
  ansible.builtin.fail:
    msg: "Biznet Gio NEO Lite VM {{ biznetgio_vm_name }} was created or already exists, but no account_id/id was returned or visible in {{ biznetgio_vm_wait_timeout }} seconds."
  when: biznetgio_vm_account_id | string | length == 0

- name: Wait for Biznet Gio NEO Lite account detail to become ready
  ansible.builtin.uri:
    url: "{{ biznetgio_api_base_url }}/neolites/accounts/{{ biznetgio_vm_account_id }}"
    method: GET
    headers:
      x-token: "{{ biznetgio_api_token }}"
    return_content: true
    status_code:
      - 200
      - 202
      - 404
      - 409
      - 422
      - 500
  register: biznetgio_vm_account_detail_response
  changed_when: false
  failed_when: false
  until: >-
    biznetgio_vm_account_detail_response.status | default(0) | int in [200, 202]
    and
    (
      (
        (
          biznetgio_vm_account_detail_response.json.data
          | default(biznetgio_vm_account_detail_response.json.result
          | default(biznetgio_vm_account_detail_response.json.account
          | default(biznetgio_vm_account_detail_response.json)))
        )
        if (biznetgio_vm_account_detail_response.json | default({})) is mapping
        else ({})
      )
      is mapping
    )
    and
    (
      not (biznetgio_vm.reserve_public_ip | default(true) | bool)
      or
      (
        (
          (
            biznetgio_vm_account_detail_response.json.data
            | default(biznetgio_vm_account_detail_response.json.result
            | default(biznetgio_vm_account_detail_response.json.account
            | default(biznetgio_vm_account_detail_response.json)))
          )
          if (biznetgio_vm_account_detail_response.json | default({})) is mapping
          else ({})
        ).extra_details.address | default('')
        | length
      ) > 0
    )
  retries: "{{ biznetgio_vm_wait_retries }}"
  delay: "{{ biznetgio_vm_wait_delay }}"
  no_log: true

- name: Normalize Biznet Gio NEO Lite account detail
  ansible.builtin.set_fact:
    biznetgio_vm_account_detail_payload: >-
      {{
        (
          biznetgio_vm_account_detail_response.json.data
          | default(biznetgio_vm_account_detail_response.json.result
          | default(biznetgio_vm_account_detail_response.json.account
          | default(biznetgio_vm_account_detail_response.json)))
        )
        if ((biznetgio_vm_account_detail_response.json | default({})) is mapping and (biznetgio_vm_account_detail_response.status | default(0) | int in [200, 202]))
        else ({})
      }}

- name: Fail when Biznet Gio NEO Lite public address is not ready
  ansible.builtin.fail:
    msg: "Biznet Gio NEO Lite VM {{ biznetgio_vm_name }} account {{ biznetgio_vm_account_id }} did not expose an address in {{ biznetgio_vm_wait_timeout }} seconds."
  when:
    - biznetgio_vm.reserve_public_ip | default(true) | bool
    - biznetgio_vm_account_detail_payload.extra_details.address | default('') | length == 0

- name: Get Biznet Gio NEO Lite VM details
  ansible.builtin.uri:
    url: "{{ biznetgio_api_base_url }}/neolites/accounts/{{ biznetgio_vm_account_id }}/vm-details"
    method: GET
    headers:
      x-token: "{{ biznetgio_api_token }}"
    return_content: true
    status_code:
      - 200
      - 202
      - 404
      - 409
      - 422
      - 500
  register: biznetgio_vm_details_response
  changed_when: false
  failed_when: false
  until: >-
    biznetgio_vm_details_response.status | default(0) | int in [200, 202]
    and
    (
      (
        biznetgio_vm_details_response.json.data
        | default(biznetgio_vm_details_response.json.result
        | default(biznetgio_vm_details_response.json.vm
        | default({})))
      )
      is mapping
      or
      biznetgio_vm_account_detail_payload.extra_details.address | default('') | length > 0
    )
  retries: "{{ biznetgio_vm_wait_retries }}"
  delay: "{{ biznetgio_vm_wait_delay }}"
  no_log: true

- name: Normalize Biznet Gio NEO Lite VM details
  ansible.builtin.set_fact:
    biznetgio_vm_details_payload: >-
      {{
        (
          biznetgio_vm_details_response.json.data
          | default(biznetgio_vm_details_response.json.result
          | default(biznetgio_vm_details_response.json.vm
          | default(biznetgio_vm_details_response.json)))
        )
        if ((biznetgio_vm_details_response.json | default({})) is mapping and (biznetgio_vm_details_response.status | default(0) | int in [200, 202]))
        else ({})
      }}

- name: Build Biznet Gio NEO Lite VM output
  ansible.builtin.set_fact:
    biznetgio_vm_result: >-
      {{
        (biznetgio_vm_existing | default({}))
        | combine(biznetgio_vm_create_payload | default({}), recursive=True)
        | combine(biznetgio_vm_created_account | default({}), recursive=True)
        | combine(biznetgio_vm_account_detail_payload | default({}), recursive=True)
        | combine(biznetgio_vm_details_payload | default({}), recursive=True)
        | combine(
            {
              'id': biznetgio_vm_account_id | string,
              'account_id': biznetgio_vm_account_id | string,
              'name': biznetgio_vm_name,
              'vm_name': biznetgio_vm_name,
              'provider': 'biznetgio'
            },
            recursive=True
          )
      }}

- name: Resolve Biznet Gio NEO Lite VM IP output
  ansible.builtin.set_fact:
    biznetgio_vm_public_ip: >-
      {{
        biznetgio_vm_result.public_ip
        | default(biznetgio_vm_result.public_ipv4
        | default(biznetgio_vm_result.public_ip_address
        | default(biznetgio_vm_result.ip_address
        | default(biznetgio_vm_result.ip
        | default(biznetgio_vm_result.ipv4
        | default(biznetgio_vm_result.address
        | default(biznetgio_vm_result.extra_details.address | default(''))))))))
      }}
    biznetgio_vm_private_ip: >-
      {{
        biznetgio_vm_result.private_ip
        | default(biznetgio_vm_result.private_ipv4
        | default(biznetgio_vm_result.private_ip_address
        | default(biznetgio_vm_result.internal_ip
        | default(biznetgio_vm_result.local_ip | default('')))))
      }}

- name: Enrich Biznet Gio NEO Lite VM output with IP aliases
  ansible.builtin.set_fact:
    biznetgio_vm_result: >-
      {{
        biznetgio_vm_result
        | combine(
            {
              'public_ip': biznetgio_vm_public_ip | regex_replace('/.*$', ''),
              'public_ipv4': biznetgio_vm_public_ip | regex_replace('/.*$', ''),
              'private_ip': biznetgio_vm_private_ip,
              'private_ipv4': biznetgio_vm_private_ip
            },
            recursive=True
          )
      }}

- name: Set Biznet Gio NEO Lite VM output
  ansible.builtin.set_fact:
    output_biznetgio_vm: "{{ output_biznetgio_vm | default({}) | combine({ biznetgio_vm_name: biznetgio_vm_result }, recursive=True) }}"
    output_vm: "{{ output_vm | default({}) | combine({ biznetgio_vm_name: biznetgio_vm_result }, recursive=True) }}"
  when: with_output is defined and with_output
