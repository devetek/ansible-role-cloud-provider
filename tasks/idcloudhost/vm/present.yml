---
- name: Validate IDCloudHost VM create input
  ansible.builtin.assert:
    that:
      - cloud_provider_auth.token | default(cloud_provider_auth.apikey | default(cloud_provider_auth.api_key | default(''))) | length > 0
      - cloud_provider_resource_detail.vm is defined
      - cloud_provider_resource_detail.vm.name is defined
      - cloud_provider_resource_detail.vm.os_name is defined
      - cloud_provider_resource_detail.vm.os_version is defined
      - cloud_provider_resource_detail.vm.disks is defined
      - cloud_provider_resource_detail.vm.vcpu is defined
      - cloud_provider_resource_detail.vm.ram is defined
      - cloud_provider_resource_detail.vm.username is defined
      - cloud_provider_resource_detail.vm.password is defined
    fail_msg: "IDCloudHost VM creation requires auth.token and vm name, os_name, os_version, disks, vcpu, ram, username, and password."

- name: Set IDCloudHost VM variables
  ansible.builtin.set_fact:
    idcloudhost_api_base_url: "{{ cloud_provider_auth.api_base_url | default('https://api.idcloudhost.com') }}"
    idcloudhost_api_token: "{{ cloud_provider_auth.token | default(cloud_provider_auth.apikey | default(cloud_provider_auth.api_key)) }}"
    idcloudhost_vm: "{{ cloud_provider_resource_detail.vm }}"
    idcloudhost_vm_region: "{{ cloud_provider_resource_detail.vm.region | default(cloud_provider_resource_detail.vm.region_id | default(cloud_provider_auth.region | default(''))) }}"
    idcloudhost_vm_wait_timeout: "{{ [cloud_provider_resource_detail.vm.wait_timeout | default(cloud_provider_auth.vm_wait_timeout | default(idcloudhost_vm_default_wait_timeout | default(1800))) | int, 1] | max }}"
    idcloudhost_vm_wait_delay: "{{ [cloud_provider_resource_detail.vm.wait_delay | default(cloud_provider_auth.vm_wait_delay | default(idcloudhost_vm_default_wait_delay | default(10))) | int, 1] | max }}"
    idcloudhost_vm_reconcile_timeout: "{{ [cloud_provider_resource_detail.vm.reconcile_timeout | default(cloud_provider_auth.vm_reconcile_timeout | default(idcloudhost_vm_default_reconcile_timeout | default(1800))) | int, 1] | max }}"
    idcloudhost_vm_reconcile_delay: "{{ [cloud_provider_resource_detail.vm.reconcile_delay | default(cloud_provider_auth.vm_reconcile_delay | default(idcloudhost_vm_default_reconcile_delay | default(10))) | int, 1] | max }}"
    idcloudhost_vm_create_success_statuses:
      - 200
      - 201
      - 202
    idcloudhost_vm_create_reconcile_statuses:
      - 400
      - 409
      - 422
      - 500
  no_log: true

- name: Set IDCloudHost VM wait retries
  ansible.builtin.set_fact:
    idcloudhost_vm_wait_retries: "{{ [((idcloudhost_vm_wait_timeout | int) / (idcloudhost_vm_wait_delay | int)) | round(0, 'ceil') | int, 1] | max }}"
    idcloudhost_vm_reconcile_retries: "{{ [((idcloudhost_vm_reconcile_timeout | int) / (idcloudhost_vm_reconcile_delay | int)) | round(0, 'ceil') | int, 1] | max }}"

- name: Set IDCloudHost VM API path
  ansible.builtin.set_fact:
    idcloudhost_vm_api_path: "{{ '/v1/' ~ idcloudhost_vm_region ~ '/user-resource/vm' if idcloudhost_vm_region | length > 0 else '/v1/user-resource/vm' }}"
    idcloudhost_vm_list_api_path: "{{ '/v1/' ~ idcloudhost_vm_region ~ '/user-resource/vm/list' if idcloudhost_vm_region | length > 0 else '/v1/user-resource/vm/list' }}"

- name: List IDCloudHost VMs
  ansible.builtin.uri:
    url: "{{ idcloudhost_api_base_url }}{{ idcloudhost_vm_list_api_path }}"
    method: GET
    headers:
      apikey: "{{ idcloudhost_api_token }}"
    return_content: true
    status_code:
      - 200
  register: idcloudhost_vm_list_response
  no_log: true

- name: Resolve existing IDCloudHost VM
  ansible.builtin.set_fact:
    idcloudhost_vm_existing: >-
      {{
        (
          idcloudhost_vm_list_response.json
          | default([])
          | selectattr('uuid', 'equalto', idcloudhost_vm.uuid | default(''))
          | list
          | first
          | default({})
        )
        if idcloudhost_vm.uuid | default('') | length > 0
        else
        (
          idcloudhost_vm_list_response.json
          | default([])
          | selectattr('name', 'equalto', idcloudhost_vm.name)
          | list
          | first
          | default({})
        )
      }}

- name: Initialize IDCloudHost VM create body
  ansible.builtin.set_fact:
    idcloudhost_vm_create_body:
      name: "{{ idcloudhost_vm.name }}"
      os_name: "{{ idcloudhost_vm.os_name }}"
      os_version: "{{ idcloudhost_vm.os_version }}"
      disks: "{{ idcloudhost_vm.disks }}"
      vcpu: "{{ idcloudhost_vm.vcpu }}"
      ram: "{{ idcloudhost_vm.ram }}"
      username: "{{ idcloudhost_vm.username }}"
      password: "{{ idcloudhost_vm.password }}"
  no_log: true

- name: Add optional IDCloudHost VM create fields
  ansible.builtin.set_fact:
    idcloudhost_vm_create_body: "{{ idcloudhost_vm_create_body | combine({ item: idcloudhost_vm[item] }) }}"
  loop:
    - backup
    - billing_account_id
    - description
    - designated_pool_uuid
    - network_uuid
    - reserve_public_ip
    - public_key
    - public_keys
    - source_uuid
    - source_replica
    - disk_uuid
  when: idcloudhost_vm[item] is defined
  no_log: true

- name: Add IDCloudHost VM cloud-init
  ansible.builtin.set_fact:
    idcloudhost_vm_create_body: "{{ idcloudhost_vm_create_body | combine({'cloud_init': idcloudhost_vm.cloud_init if idcloudhost_vm.cloud_init is string else (idcloudhost_vm.cloud_init | to_json)}) }}"
  when: idcloudhost_vm.cloud_init is defined
  no_log: true

- name: Create IDCloudHost VM
  ansible.builtin.uri:
    url: "{{ idcloudhost_api_base_url }}{{ idcloudhost_vm_api_path }}"
    method: POST
    headers:
      apikey: "{{ idcloudhost_api_token }}"
      content-type: application/x-www-form-urlencoded
    body_format: form-urlencoded
    body: "{{ idcloudhost_vm_create_body }}"
    return_content: true
    status_code:
      - 200
      - 201
      - 202
      - 400
      - 401
      - 403
      - 404
      - 409
      - 422
      - 500
  register: idcloudhost_vm_create_response
  changed_when: idcloudhost_vm_create_response.status in idcloudhost_vm_create_success_statuses
  failed_when: false
  when: idcloudhost_vm_existing.uuid | default('') | length == 0
  no_log: true

- name: Set IDCloudHost VM create response reference
  ansible.builtin.set_fact:
    idcloudhost_vm_created_uuid: "{{ idcloudhost_vm_create_response.json.uuid | default('') }}"
  when:
    - idcloudhost_vm_existing.uuid | default('') | length == 0
    - idcloudhost_vm_create_response is defined

- name: Build IDCloudHost VM create rejection detail
  ansible.builtin.set_fact:
    idcloudhost_vm_create_error_status: "{{ idcloudhost_vm_create_response.status | default('unknown') }}"
    idcloudhost_vm_create_error_response: >-
      {%- set response_json = idcloudhost_vm_create_response.json | default({}) -%}
      {%- if response_json is mapping -%}
      {{ response_json.Error | default(response_json.error | default(response_json.errors | default(response_json.message | default(response_json.Message | default(response_json.detail | default(response_json.details | default(response_json | to_json))))))) }}
      {%- elif response_json -%}
      {{ response_json | to_json }}
      {%- elif idcloudhost_vm_create_response.content | default('') | length > 0 -%}
      {{ idcloudhost_vm_create_response.content }}
      {%- else -%}
      empty provider response
      {%- endif -%}
  when:
    - idcloudhost_vm_existing.uuid | default('') | length == 0
    - idcloudhost_vm_create_response is defined
    - idcloudhost_vm_create_response.status not in idcloudhost_vm_create_success_statuses

- name: Wait for IDCloudHost VM creation to become visible
  ansible.builtin.uri:
    url: "{{ idcloudhost_api_base_url }}{{ idcloudhost_vm_list_api_path }}"
    method: GET
    headers:
      apikey: "{{ idcloudhost_api_token }}"
    return_content: true
    status_code:
      - 200
  register: idcloudhost_vm_wait_list_response
  until: >-
    (
      idcloudhost_vm_created_uuid | default('') | length > 0
      and
      (
        idcloudhost_vm_wait_list_response.json
        | default([])
        | selectattr('uuid', 'equalto', idcloudhost_vm_created_uuid)
        | list
        | length
      ) > 0
    )
    or
    (
      idcloudhost_vm_created_uuid | default('') | length == 0
      and
      (
        idcloudhost_vm_wait_list_response.json
        | default([])
        | selectattr('name', 'equalto', idcloudhost_vm.name)
        | list
        | length
      ) > 0
    )
  retries: "{{ idcloudhost_vm_wait_retries }}"
  delay: "{{ idcloudhost_vm_wait_delay }}"
  failed_when: false
  when:
    - idcloudhost_vm_existing.uuid | default('') | length == 0
    - idcloudhost_vm_create_response.status in idcloudhost_vm_create_success_statuses
  no_log: true

- name: Resolve created IDCloudHost VM after wait
  ansible.builtin.set_fact:
    idcloudhost_vm_created: >-
      {{
        (
          idcloudhost_vm_wait_list_response.json
          | default([])
          | selectattr('uuid', 'equalto', idcloudhost_vm_created_uuid | default(''))
          | list
          | first
          | default({})
        )
        if idcloudhost_vm_created_uuid | default('') | length > 0
        else
        (
          idcloudhost_vm_wait_list_response.json
          | default([])
          | selectattr('name', 'equalto', idcloudhost_vm.name)
          | list
          | first
          | default({})
        )
      }}
  when:
    - idcloudhost_vm_existing.uuid | default('') | length == 0
    - idcloudhost_vm_create_response.status in idcloudhost_vm_create_success_statuses

- name: Reconcile IDCloudHost VM creation after rejected response
  ansible.builtin.uri:
    url: "{{ idcloudhost_api_base_url }}{{ idcloudhost_vm_list_api_path }}"
    method: GET
    headers:
      apikey: "{{ idcloudhost_api_token }}"
    return_content: true
    status_code:
      - 200
  register: idcloudhost_vm_reconcile_list_response
  until: >-
    (
      idcloudhost_vm_created_uuid | default('') | length > 0
      and
      (
        idcloudhost_vm_reconcile_list_response.json
        | default([])
        | selectattr('uuid', 'equalto', idcloudhost_vm_created_uuid)
        | list
        | length
      ) > 0
    )
    or
    (
      idcloudhost_vm_created_uuid | default('') | length == 0
      and
      (
        idcloudhost_vm_reconcile_list_response.json
        | default([])
        | selectattr('name', 'equalto', idcloudhost_vm.name)
        | list
        | length
      ) > 0
    )
  retries: "{{ idcloudhost_vm_reconcile_retries }}"
  delay: "{{ idcloudhost_vm_reconcile_delay }}"
  failed_when: false
  when:
    - idcloudhost_vm_existing.uuid | default('') | length == 0
    - idcloudhost_vm_create_response.status in idcloudhost_vm_create_reconcile_statuses
  no_log: true

- name: Resolve created IDCloudHost VM after rejected response reconciliation
  ansible.builtin.set_fact:
    idcloudhost_vm_created: >-
      {{
        (
          idcloudhost_vm_reconcile_list_response.json
          | default([])
          | selectattr('uuid', 'equalto', idcloudhost_vm_created_uuid | default(''))
          | list
          | first
          | default({})
        )
        if idcloudhost_vm_created_uuid | default('') | length > 0
        else
        (
          idcloudhost_vm_reconcile_list_response.json
          | default([])
          | selectattr('name', 'equalto', idcloudhost_vm.name)
          | list
          | first
          | default({})
        )
      }}
  when:
    - idcloudhost_vm_existing.uuid | default('') | length == 0
    - idcloudhost_vm_create_response.status in idcloudhost_vm_create_reconcile_statuses

- name: Fail when IDCloudHost VM creation request is rejected
  ansible.builtin.fail:
    msg: >-
      IDCloudHost VM creation request was rejected
      (status={{ idcloudhost_vm_create_error_status | default(idcloudhost_vm_create_response.status | default('unknown')) }},
      path={{ idcloudhost_vm_api_path }},
      region={{ idcloudhost_vm_region | default('') }},
      name={{ idcloudhost_vm.name }}).
      Provider response: {{ idcloudhost_vm_create_error_response | default('empty provider response') }}.
      Reconciliation: {{
        'no matching VM was visible in ' ~ idcloudhost_vm_reconcile_timeout ~ ' seconds'
        if idcloudhost_vm_create_response.status in idcloudhost_vm_create_reconcile_statuses
        else 'not attempted for this status'
      }}.
  when:
    - idcloudhost_vm_existing.uuid | default('') | length == 0
    - idcloudhost_vm_create_response.status not in idcloudhost_vm_create_success_statuses
    - idcloudhost_vm_created.uuid | default('') | length == 0

- name: Fail when IDCloudHost VM creation is not visible before timeout
  ansible.builtin.fail:
    msg: "IDCloudHost VM creation was accepted but VM {{ idcloudhost_vm.name }} did not become visible in {{ idcloudhost_vm_wait_timeout }} seconds."
  when:
    - idcloudhost_vm_existing.uuid | default('') | length == 0
    - idcloudhost_vm_create_response.status in idcloudhost_vm_create_success_statuses
    - idcloudhost_vm_created.uuid | default('') | length == 0

- name: Set IDCloudHost VM result
  ansible.builtin.set_fact:
    idcloudhost_vm_result: "{{ idcloudhost_vm_existing if idcloudhost_vm_existing.uuid | default('') | length > 0 else idcloudhost_vm_created }}"

- name: Set IDCloudHost VM output
  ansible.builtin.set_fact:
    output_idcloudhost_vm: "{{ output_idcloudhost_vm | default({}) | combine({ idcloudhost_vm.name: idcloudhost_vm_result }, recursive=True) }}"
    output_vm: "{{ output_vm | default({}) | combine({ idcloudhost_vm.name: idcloudhost_vm_result }, recursive=True) }}"
  when: with_output is defined and with_output
