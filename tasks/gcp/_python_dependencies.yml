---
- name: Use Ansible runtime Python for GCP modules
  ansible.builtin.set_fact:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    gcp_python_interpreter: "{{ ansible_playbook_python }}"

- name: Check GCP Python dependencies
  ansible.builtin.command: "{{ gcp_python_interpreter }} -c 'import requests, google.auth'"
  register: gcp_python_dependencies_check
  changed_when: false
  failed_when: false

- name: Install GCP Python dependencies
  ansible.builtin.command: "{{ gcp_python_interpreter }} -m pip install requests google-auth"
  register: gcp_python_dependencies_install
  changed_when: "'Successfully installed' in (gcp_python_dependencies_install.stdout | default(''))"
  environment:
    PIP_BREAK_SYSTEM_PACKAGES: "1"
  when: gcp_python_dependencies_check.rc != 0

- name: Validate GCP Python dependencies
  ansible.builtin.command: "{{ gcp_python_interpreter }} -c 'import requests, google.auth'"
  changed_when: false
