---
- name: Resolve AWS Subnet create request
  ansible.builtin.set_fact:
    aws_subnet: "{{ aws_subnet_request if (aws_subnet_request is defined and aws_subnet_request | length > 0) else (cloud_provider_resource_detail.subnet | default({})) }}"
  no_log: true

- name: Validate AWS Subnet create input
  ansible.builtin.assert:
    that:
      - (cloud_provider_auth.profile | default(cloud_provider_auth.aws_profile | default('')) | length > 0) or ((cloud_provider_auth.access_key | default(cloud_provider_auth.aws_access_key | default('')) | length > 0) and (cloud_provider_auth.secret_key | default(cloud_provider_auth.aws_secret_key | default('')) | length > 0))
      - aws_subnet | length > 0
      - (aws_subnet.name | default(aws_subnet.subnet_name | default(''))) | length > 0
      - (aws_subnet.region | default(aws_subnet.region_id | default(cloud_provider_auth.region | default('')))) | length > 0
      - (aws_subnet.cidr | default(aws_subnet.cidr_block | default(''))) | length > 0
      - (aws_subnet.vpc_id | default(aws_subnet.vpc | default(aws_subnet.network_id | default(''))) | string | length > 0) or (aws_subnet.vpc_name | default('') | length > 0)
    fail_msg: "AWS Subnet creation requires auth.profile or auth.access_key/auth.secret_key, plus subnet.name, subnet.region, subnet.cidr, and subnet.vpc_id (or subnet.vpc_name)."

- name: Set AWS Subnet variables
  ansible.builtin.set_fact:
    aws_subnet_name: "{{ aws_subnet.name | default(aws_subnet.subnet_name | default('')) }}"
    aws_subnet_region: "{{ aws_subnet.region | default(aws_subnet.region_id | default(cloud_provider_auth.region | default(''))) }}"
    aws_subnet_cidr: "{{ aws_subnet.cidr | default(aws_subnet.cidr_block | default('')) }}"
    aws_subnet_az: "{{ aws_subnet.az | default(aws_subnet.availability_zone | default('')) }}"
    aws_subnet_vpc_id: "{{ aws_subnet.vpc_id | default(aws_subnet.vpc | default(aws_subnet.network_id | default(''))) }}"
    aws_subnet_vpc_name: "{{ aws_subnet.vpc_name | default('') }}"
    aws_subnet_profile: "{{ cloud_provider_auth.profile | default(cloud_provider_auth.aws_profile | default('')) }}"
    aws_subnet_access_key: "{{ cloud_provider_auth.access_key | default(cloud_provider_auth.aws_access_key | default('')) }}"
    aws_subnet_secret_key: "{{ cloud_provider_auth.secret_key | default(cloud_provider_auth.aws_secret_key | default('')) }}"
    aws_subnet_session_token: "{{ cloud_provider_auth.session_token | default(cloud_provider_auth.aws_session_token | default('')) }}"
    aws_subnet_wait_timeout: "{{ [aws_subnet.timeout | default(cloud_provider_auth.vm_timeout | default(300)) | int, 1] | max }}"
  no_log: true

- name: Resolve AWS Subnet VPC ID from name
  amazon.aws.ec2_vpc_net_info:
    region: "{{ aws_subnet_region }}"
    profile: "{{ aws_subnet_profile if aws_subnet_profile | length > 0 else omit }}"
    access_key: "{{ aws_subnet_access_key if aws_subnet_profile | length == 0 else omit }}"
    secret_key: "{{ aws_subnet_secret_key if aws_subnet_profile | length == 0 else omit }}"
    session_token: "{{ aws_subnet_session_token if aws_subnet_session_token | length > 0 else omit }}"
    filters:
      tag:Name: "{{ aws_subnet_vpc_name }}"
  register: aws_subnet_vpc_lookup
  changed_when: false
  when:
    - aws_subnet_vpc_id | string | length == 0
    - aws_subnet_vpc_name | string | length > 0
  no_log: true

- name: Set AWS Subnet VPC ID from lookup
  ansible.builtin.set_fact:
    aws_subnet_vpc_id: "{{ aws_subnet_vpc_lookup.vpcs | default([]) | map(attribute='id') | list | first | default('') }}"
  when:
    - aws_subnet_vpc_id | string | length == 0
    - aws_subnet_vpc_lookup is defined

- name: Validate resolved AWS Subnet VPC ID
  ansible.builtin.assert:
    that:
      - aws_subnet_vpc_id | string | length > 0
    fail_msg: "AWS Subnet creation could not resolve vpc_id. Set subnet.vpc_id or subnet.vpc_name with an existing VPC."

- name: Create or update AWS Subnet
  amazon.aws.ec2_vpc_subnet:
    region: "{{ aws_subnet_region }}"
    profile: "{{ aws_subnet_profile if aws_subnet_profile | length > 0 else omit }}"
    access_key: "{{ aws_subnet_access_key if aws_subnet_profile | length == 0 else omit }}"
    secret_key: "{{ aws_subnet_secret_key if aws_subnet_profile | length == 0 else omit }}"
    session_token: "{{ aws_subnet_session_token if aws_subnet_session_token | length > 0 else omit }}"
    state: present
    vpc_id: "{{ aws_subnet_vpc_id }}"
    cidr: "{{ aws_subnet_cidr }}"
    az: "{{ aws_subnet_az if aws_subnet_az | length > 0 else omit }}"
    map_public: "{{ aws_subnet.map_public | default(omit) }}"
    assign_instances_ipv6: "{{ aws_subnet.assign_instances_ipv6 | default(omit) }}"
    ipv6_cidr: "{{ aws_subnet.ipv6_cidr | default(omit) }}"
    purge_tags: "{{ aws_subnet.purge_tags | default(omit) }}"
    wait: true
    wait_timeout: "{{ aws_subnet_wait_timeout }}"
    tags: "{{ {'Name': aws_subnet_name} | combine(aws_subnet.tags | default({})) }}"
  register: aws_subnet_apply
  no_log: true

- name: Refresh AWS Subnet details
  amazon.aws.ec2_vpc_subnet_info:
    region: "{{ aws_subnet_region }}"
    profile: "{{ aws_subnet_profile if aws_subnet_profile | length > 0 else omit }}"
    access_key: "{{ aws_subnet_access_key if aws_subnet_profile | length == 0 else omit }}"
    secret_key: "{{ aws_subnet_secret_key if aws_subnet_profile | length == 0 else omit }}"
    session_token: "{{ aws_subnet_session_token if aws_subnet_session_token | length > 0 else omit }}"
    filters:
      vpc-id: "{{ aws_subnet_vpc_id }}"
      cidr-block: "{{ aws_subnet_cidr }}"
  register: aws_subnet_info
  changed_when: false
  no_log: true

- name: Resolve AWS Subnet output payload
  ansible.builtin.set_fact:
    aws_subnet_result_raw: "{{ (aws_subnet_info.subnets | default([]) | first | default(aws_subnet_apply.subnet | default({}))) }}"

- name: Build normalized AWS Subnet output
  ansible.builtin.set_fact:
    aws_subnet_result: >-
      {{
        aws_subnet_result_raw
        | combine(
            {
              'provider': 'aws',
              'id': aws_subnet_result_raw.subnet_id | default(''),
              'subnet_id': aws_subnet_result_raw.subnet_id | default(''),
              'provider_resource_id': aws_subnet_result_raw.subnet_id | default(''),
              'name': (aws_subnet_result_raw.tags.Name | default(aws_subnet_name)),
              'subnet_name': (aws_subnet_result_raw.tags.Name | default(aws_subnet_name)),
              'region': aws_subnet_region,
              'region_id': aws_subnet_region,
              'vpc_id': aws_subnet_result_raw.vpc_id | default(aws_subnet_vpc_id),
              'cidr': aws_subnet_result_raw.cidr_block | default(aws_subnet_cidr),
              'cidr_block': aws_subnet_result_raw.cidr_block | default(aws_subnet_cidr),
              'availability_zone': aws_subnet_result_raw.availability_zone | default(aws_subnet_az)
            },
            recursive=True
          )
      }}

- name: Set AWS Subnet output
  ansible.builtin.set_fact:
    output_aws_subnet: "{{ output_aws_subnet | default({}) | combine({ aws_subnet_name: aws_subnet_result }, recursive=True) }}"
    output_subnet: "{{ output_subnet | default({}) | combine({ aws_subnet_name: aws_subnet_result }, recursive=True) }}"
  when: with_output is defined and with_output
